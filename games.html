<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RS5Hack Cyber Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#040814;
    --card:#0b1120;
    --card2:#111b31;
    --green:#00ffb3;
    --blue:#00d9ff;
    --pink:#ff008c;
    --text:#ffffff;
    --gray:#94a3b8;
}

body{
    background:
    radial-gradient(circle at top left,#102347,#040814 60%);
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Orbitron',sans-serif;
    color:white;
    position:relative;
}

/* GRID */

body::before{
    content:'';
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(0,255,179,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,179,.07) 1px, transparent 1px);

    background-size:45px 45px;

    animation:gridMove 12s linear infinite;

    z-index:-3;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(45px);
    }
}

/* GLOW */

.glow{
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.15;
    z-index:-2;
}

.glow1{
    background:#00ffb3;
    top:-250px;
    left:-250px;
}

.glow2{
    background:#00d9ff;
    bottom:-250px;
    right:-250px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1500px;
    margin:auto;
    padding:30px 0 80px;
}

/* HEADER */

.header{
    background:rgba(255,255,255,.03);

    border:1px solid rgba(0,255,179,.2);

    backdrop-filter:blur(25px);

    border-radius:35px;

    padding:40px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;

    box-shadow:
    0 0 40px rgba(0,255,179,.1),
    inset 0 0 20px rgba(255,255,255,.03);
}

.profile{
    display:flex;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
}

/* AVATAR */

.avatar{
    width:170px;
    height:170px;
    border-radius:50%;
    overflow:hidden;
    position:relative;

    border:4px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 35px rgba(0,255,179,.5),
    0 0 100px rgba(0,255,179,.25);

    flex-shrink:0;
}

.avatar::before{
    content:'';
    position:absolute;
    inset:-10px;
    border-radius:50%;
    border:2px solid rgba(0,255,179,.25);
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    border-radius:50%;
}

.profile-info h1{
    font-size:3rem;

    background:linear-gradient(
    90deg,
    var(--green),
    var(--blue),
    var(--pink));

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:rgb 5s linear infinite;
}

@keyframes rgb{
    from{
        background-position:0%;
    }
    to{
        background-position:300%;
    }
}

.username{
    color:var(--blue);
    margin-top:10px;
    font-size:1.1rem;
}

.profile-info p{
    color:var(--gray);
    margin-top:8px;
}

/* STATS */

.stats{
    display:flex;
    gap:20px;
    margin-top:25px;
    flex-wrap:wrap;
}

.stat-box{
    min-width:120px;

    padding:18px 25px;

    border-radius:20px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.06);

    text-align:center;

    box-shadow:
    inset 0 0 20px rgba(255,255,255,.02),
    0 0 15px rgba(0,0,0,.3);
}

.stat-box h2{
    color:var(--green);
    font-size:2rem;
}

.stat-box span{
    color:var(--gray);
}

/* CLOCK */

.clock{
    padding:18px 28px;

    border-radius:20px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(0,255,179,.2);

    color:var(--green);

    font-size:1.3rem;

    box-shadow:
    0 0 25px rgba(0,255,179,.15);

    text-shadow:0 0 10px var(--green);
}

/* TITLE */

.title{
    margin:60px 0 35px;
}

.title h2{
    font-size:3.5rem;

    background:linear-gradient(
    90deg,
    var(--pink),
    var(--green),
    var(--blue));

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:rgb 5s linear infinite;
}

.title p{
    color:var(--gray);
    margin-top:15px;
    font-size:1.1rem;
}

/* GRID */

.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:35px;
}

/* CARD */

.game-card{
    background:
    linear-gradient(
    145deg,
    var(--card),
    var(--card2));

    border-radius:30px;

    overflow:hidden;

    position:relative;

    cursor:pointer;

    transition:.5s;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:
    0 0 30px rgba(0,0,0,.4),
    inset 0 0 20px rgba(255,255,255,.02);
}

.game-card:hover{
    transform:
    translateY(-12px)
    scale(1.02);

    border-color:rgba(0,255,179,.4);

    box-shadow:
    0 0 40px rgba(0,255,179,.25),
    0 0 80px rgba(0,217,255,.15);
}

/* IMAGE */

.game-image{
    height:230px;
    position:relative;
    overflow:hidden;
    background:#09101f;
}

.game-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.5s;
}

.game-card:hover .game-image img{
    transform:scale(1.1);
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.6);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    transition:.4s;
}

.overlay span{
    color:var(--green);
    font-size:1.3rem;
    text-shadow:0 0 15px var(--green);
}

.game-card:hover .overlay{
    opacity:1;
}

/* CONTENT */

.game-content{
    padding:25px;
}

.game-content h3{
    color:var(--green);
    font-size:1.8rem;
    margin-bottom:15px;
}

.game-content p{
    color:var(--gray);
    line-height:1.8;
}

.meta{
    margin-top:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.category{
    background:rgba(0,255,179,.08);

    padding:10px 18px;

    border-radius:30px;

    border:1px solid rgba(0,255,179,.15);

    color:var(--green);

    font-size:.85rem;
}

.rating{
    color:var(--blue);
}

/* TERMINAL */

.terminal{
    margin-top:60px;

    background:#03050f;

    border-radius:30px;

    padding:35px;

    border:1px solid rgba(0,255,179,.15);

    position:relative;

    overflow:hidden;

    box-shadow:
    0 0 30px rgba(0,255,179,.08);
}

.terminal::before{
    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(
    transparent,
    rgba(0,255,179,.04),
    transparent);

    animation:scan 5s linear infinite;

    pointer-events:none;
}

@keyframes scan{
    from{
        transform:translateY(-100%);
    }
    to{
        transform:translateY(100%);
    }
}

.terminal h3{
    color:var(--green);
    margin-bottom:20px;
    text-shadow:0 0 10px var(--green);
}

#typing{
    color:var(--blue);
    line-height:2;
    font-family:monospace;
    white-space:pre-line;
}

.terminal-info{
    margin-top:30px;

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:20px;
}

.terminal-box{
    padding:18px;

    border-radius:18px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(0,255,179,.08);

    color:var(--green);

    font-family:monospace;
}

.terminal-box span{
    display:block;
    margin-bottom:8px;
    color:var(--gray);
}

/* RESPONSIVE */

@media(max-width:768px){

    .header{
        flex-direction:column;
        text-align:center;
    }

    .profile{
        flex-direction:column;
    }

    .stats{
        justify-content:center;
    }

    .title h2{
        font-size:2.4rem;
    }

    .profile-info h1{
        font-size:2.3rem;
    }

}

</style>
</head>
